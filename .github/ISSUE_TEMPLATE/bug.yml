name: Bug report
description: Report a reproducible defect in SmartFlow
title: "[Bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: "Provide enough evidence for another contributor to reproduce and validate the defect."
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Where and when does the problem occur?
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Branch, commit, browser/device, mode, and relevant configuration.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, screenshots, recordings, failing tests, or traces. Do not include secrets.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: "- [ ] Reproduction test added\n- [ ] Root cause fixed\n- [ ] Regression validation passes"
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks and dependencies
