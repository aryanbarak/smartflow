name: Deploy DailyFlow to Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

concurrency:
  group: cloudflare-pages-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_TUTOR_API_URL: ${{ secrets.VITE_TUTOR_API_URL }}
          VITE_TUTOR_API_TOKEN: ${{ secrets.VITE_TUTOR_API_TOKEN }}
          VITE_AI_AGENT_URL: ${{ secrets.VITE_AI_AGENT_URL }}
          VITE_APP_ENV: ${{ secrets.VITE_APP_ENV }}
        run: npm run build

      - name: Verify dist
        run: test -f dist/index.html

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }} --branch main
