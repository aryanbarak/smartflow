<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="65%" r="50%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#040810"/>
    </radialGradient>
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="45%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <filter id="letterGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="dotGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="horizonGlow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="circuitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bgGlow)"/>
  <ellipse cx="400" cy="520" rx="280" ry="18" fill="url(#horizonGlow)"/>
  <line x1="120" y1="520" x2="680" y2="520" stroke="#0ea5e9" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- Letter A (left) -->
  <g filter="url(#letterGlow)">
    <path d="M 148 470 L 148 455 L 218 175 L 248 175 L 178 455 L 193 455 L 193 470 Z" fill="url(#letterGrad)"/>
    <path d="M 248 175 L 278 175 L 320 340 L 305 340 Z" fill="url(#letterGrad)"/>
    <rect x="178" y="318" width="110" height="22" rx="3" fill="url(#letterGrad)"/>
    <path d="M 163 462 Q 260 510 340 472" fill="none" stroke="url(#letterGrad)" stroke-width="14" stroke-linecap="round"/>
  </g>

  <!-- Letter B (center) -->
  <g filter="url(#letterGlow)">
    <rect x="318" y="175" width="32" height="295" rx="4" fill="url(#letterGrad)"/>
    <path d="M 350 175 Q 450 175 450 240 Q 450 305 350 305 L 350 175Z" fill="url(#letterGrad)"/>
    <path d="M 354 195 Q 424 195 424 240 Q 424 285 354 285 L 354 195Z" fill="#040d1a"/>
    <path d="M 350 305 Q 465 305 465 385 Q 465 470 350 470 L 350 305Z" fill="url(#letterGrad)"/>
    <path d="M 354 325 Q 438 325 438 385 Q 438 448 354 448 L 354 325Z" fill="#040d1a"/>
    <line x1="370" y1="348" x2="418" y2="348" stroke="url(#circuitGrad)" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="418" cy="348" r="3.5" fill="#00d4ff" filter="url(#dotGlow)"/>
    <line x1="418" y1="348" x2="418" y2="338" stroke="#00d4ff" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="370" y1="368" x2="410" y2="368" stroke="url(#circuitGrad)" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="410" cy="368" r="3.5" fill="#00d4ff" filter="url(#dotGlow)"/>
    <line x1="410" y1="368" x2="410" y2="358" stroke="#00d4ff" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="370" y1="388" x2="400" y2="388" stroke="url(#circuitGrad)" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="400" cy="388" r="3.5" fill="#00d4ff" filter="url(#dotGlow)"/>
    <line x1="400" y1="388" x2="400" y2="378" stroke="#00d4ff" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="370" y1="408" x2="392" y2="408" stroke="url(#circuitGrad)" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="392" cy="408" r="3.5" fill="#00d4ff" filter="url(#dotGlow)"/>
    <line x1="392" y1="408" x2="392" y2="398" stroke="#00d4ff" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="370" y1="428" x2="385" y2="428" stroke="url(#circuitGrad)" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="385" cy="428" r="3.5" fill="#00d4ff" filter="url(#dotGlow)"/>
    <line x1="385" y1="428" x2="385" y2="418" stroke="#00d4ff" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="370" y1="344" x2="370" y2="434" stroke="#00d4ff" stroke-width="1.2" stroke-opacity="0.5" stroke-linecap="round"/>
  </g>

  <!-- Letter A (right) -->
  <g filter="url(#letterGlow)">
    <path d="M 480 340 L 522 175 L 552 175 L 482 470 L 467 470 L 467 455 L 480 455 Z" fill="url(#letterGrad)"/>
    <path d="M 552 175 L 582 175 L 652 455 L 637 455 L 637 470 L 607 470 L 607 455 L 622 455 Z" fill="url(#letterGrad)"/>
    <rect x="512" y="318" width="110" height="22" rx="3" fill="url(#letterGrad)"/>
    <path d="M 460 472 Q 540 510 637 462" fill="none" stroke="url(#letterGrad)" stroke-width="14" stroke-linecap="round"/>
  </g>

  <!-- Separator dots -->
  <circle cx="308" cy="320" r="10" fill="#0ea5e9" filter="url(#dotGlow)"/>
  <circle cx="308" cy="320" r="5" fill="#7dd3fc"/>
  <circle cx="492" cy="320" r="10" fill="#0ea5e9" filter="url(#dotGlow)"/>
  <circle cx="492" cy="320" r="5" fill="#7dd3fc"/>

  <!-- Top node -->
  <line x1="400" y1="140" x2="400" y2="173" stroke="#0ea5e9" stroke-width="1.5" stroke-opacity="0.6"/>
  <circle cx="400" cy="118" r="22" fill="none" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.5" stroke-dasharray="3 2"/>
  <circle cx="400" cy="118" r="16" fill="#0a1f3d" stroke="#0ea5e9" stroke-width="1.5"/>
  <circle cx="400" cy="118" r="7" fill="#00d4ff" filter="url(#dotGlow)"/>
</svg>
