<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { margin:0; overflow:hidden; background:#07060E; }
    a, a:hover { color:#9B8FFF; }

    @keyframes dotAppear {
      0%  { opacity:0; }
      25% { opacity:1; }
      80% { opacity:1; }
      100%{ opacity:0; }
    }
    @keyframes ringExpand {
      0%   { transform:translate(-50%,-50%) scale(0.04); opacity:0.75; }
      100% { transform:translate(-50%,-50%) scale(1);    opacity:0; }
    }
    @keyframes fullOrbJourney {
      0%   { top:50%; left:50%; width:5px;  height:5px;  opacity:0; filter:blur(14px); transform:translate(-50%,-50%); box-shadow:none; }
      31%  { top:50%; left:50%; width:80px; height:80px; opacity:1; filter:blur(0);    transform:translate(-50%,-50%); box-shadow:0 0 40px #7B6FE8A0,0 0 100px #4A3FD455,0 0 160px #1A0F6B20; }
      62%  { top:50%; left:50%; width:80px; height:80px; opacity:1; filter:blur(0);    transform:translate(-50%,-50%); box-shadow:0 0 40px #7B6FE8A0,0 0 100px #4A3FD455,0 0 160px #1A0F6B20; }
      74%  { top:33%; left:37%; width:55px; height:55px; opacity:1; filter:blur(0);    transform:translate(-50%,-50%); box-shadow:0 0 28px #7B6FE880,0 0 70px #4A3FD440; }
      84%  { top:10%; left:10%; width:30px; height:30px; opacity:1; filter:blur(0);    transform:translate(-50%,-50%) scale(1.1); box-shadow:0 0 20px #7B6FE870,0 0 50px #4A3FD430; }
      90%  { top:3%;  left:6%;  width:24px; height:24px; opacity:1; filter:blur(0);    transform:translate(-50%,-50%) scale(1.0); box-shadow:0 0 14px #7B6FE870,0 0 32px #4A3FD438; }
      100% { top:3%;  left:6%;  width:24px; height:24px; opacity:0; filter:blur(0);    transform:translate(-50%,-50%); box-shadow:none; }
    }
    @keyframes greetingLife {
      0%   { opacity:0; transform:translate(-50%,8px); }
      28%  { opacity:0.72; transform:translate(-50%,0); }
      68%  { opacity:0.72; transform:translate(-50%,0); }
      100% { opacity:0; transform:translate(-50%,-5px); }
    }
    @keyframes trailLife {
      0%  { opacity:0; }
      18% { opacity:0.7; }
      65% { opacity:0.55; }
      100%{ opacity:0; }
    }
    @keyframes navAppear {
      from { opacity:0; }
      to   { opacity:1; }
    }
    @keyframes navOrbArrive {
      from { opacity:0; transform:translate(-50%,-50%) scale(0.65); }
      to   { opacity:1; transform:translate(-50%,-50%) scale(1); }
    }
    @keyframes orbBreatheNav {
      0%,100% { box-shadow:0 0 14px #7B6FE870,0 0 32px #4A3FD438; }
      50%     { box-shadow:0 0 26px #7B6FE8A0,0 0 58px #4A3FD460; }
    }
    @keyframes navGlowBreathe {
      0%,100% { opacity:0.18; }
      50%     { opacity:0.30; }
    }
    @keyframes cardBirth {
      0%   { opacity:0; transform:translateY(18px); }
      55%  { opacity:1; transform:translateY(0); }
      100% { opacity:1; transform:translateY(0); }
    }
    @keyframes shimmerOnce {
      0%   { transform:translateX(-100%); }
      100% { transform:translateX(300%); }
    }
    @keyframes contentAppear {
      from { opacity:0; transform:translateY(4px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes ambientBreathe {
      0%,100% { opacity:0.18; }
      50%     { opacity:0.30; }
    }
    @keyframes cardBorderGlow {
      0%,100% { border-color:rgba(107,95,232,0.13); }
      50%     { border-color:rgba(107,95,232,0.27); }
    }
    @keyframes orbBreatheFull {
      0%,100% { box-shadow:0 0 40px #7B6FE880,0 0 100px #4A3FD445; }
      50%     { box-shadow:0 0 60px #7B6FE8A8,0 0 130px #4A3FD462; }
    }
    @keyframes replayIn {
      from { opacity:0; transform:translate(-50%,10px); }
      to   { opacity:1; transform:translate(-50%,0); }
    }
    @keyframes progressFill {
      from { width:0%; }
      to   { width:68%; }
    }
  </style>
</helmet>

<!-- FULL-SCREEN DARK FIELD -->
<div style="position:fixed; inset:0; background:#07060E; display:flex; align-items:flex-start; justify-content:center; overflow:hidden;">

  <!-- PHONE CONTAINER -->
  <div style="position:relative; width:min(390px,100vw); height:100dvh; overflow:hidden; background:#07060E;">

    <!-- ─────────────────────────────────────────── -->
    <!-- KEY WRAPPER — remounts on replay            -->
    <!-- ─────────────────────────────────────────── -->
    <div key="{{ playKey }}" style="position:absolute; inset:0;">

      <!-- AMBIENT BACKGROUND GLOW (workspace alive) -->
      <div style="position:absolute; inset:0; background:radial-gradient(ellipse at 6% 3%, rgba(107,95,232,0.22) 0%, transparent 55%); animation:ambientBreathe 3.6s ease-in-out 3.1s infinite; opacity:0; animation-fill-mode:both;"></div>

      <!-- ── PHASE 3: HEARTBEAT HALOS ── -->
      <div style="position:absolute; top:50%; left:50%; width:180px; height:180px; border-radius:50%; border:1.5px solid rgba(196,184,255,0.45); animation:ringExpand 0.68s ease-out 0.80s both;"></div>
      <div style="position:absolute; top:50%; left:50%; width:180px; height:180px; border-radius:50%; border:1px solid rgba(168,151,255,0.28); animation:ringExpand 0.68s ease-out 0.93s both;"></div>
      <div style="position:absolute; top:50%; left:50%; width:180px; height:180px; border-radius:50%; border:1px solid rgba(107,95,232,0.16); animation:ringExpand 0.68s ease-out 1.06s both;"></div>

      <!-- ── PHASE 2–4: THE INITIAL DOT ── -->
      <div style="position:absolute; top:50%; left:50%; width:5px; height:5px; border-radius:50%; background:#C4B8FF; transform:translate(-50%,-50%); box-shadow:0 0 8px rgba(196,184,255,0.9),0 0 20px rgba(123,111,232,0.45); animation:dotAppear 0.8s ease-in-out 0.40s both;"></div>

      <!-- ── PHASE 4–8: THE ORB — complete journey (dot → full orb → nav) ── -->
      <div style="position:absolute; top:50%; left:50%; width:5px; height:5px; border-radius:50%; background:radial-gradient(circle at 36% 30%,#EDE8FF 0%,#B4A8FF 18%,#7B6FE8 46%,#3D2FBE 72%,#1A0F6B 92%); animation:fullOrbJourney 1.6s cubic-bezier(0.4,0,0.25,1) 1.20s both; z-index:10;">
        <!-- specular glint (scales with the orb since it's %) -->
        <div style="position:absolute; top:18%; left:18%; width:28%; height:22%; border-radius:50%; background:rgba(255,252,255,0.22); filter:blur(2px);"></div>
      </div>

      <!-- ── PHASE 5: "Welcome." GREETING ── -->
      <div style="position:absolute; top:calc(50% + 54px); left:50%; font-family:'DM Sans',sans-serif; font-size:19px; font-weight:300; font-style:italic; letter-spacing:0.02em; color:rgba(230,226,255,0.70); white-space:nowrap; animation:greetingLife 0.82s ease-in-out 1.70s both; pointer-events:none;">Welcome.</div>

      <!-- ── PHASE 6: LIGHT TRAIL (Orb departure) ── -->
      <svg style="position:absolute; inset:0; width:100%; height:100%; overflow:visible; animation:trailLife 0.80s ease-in-out 2.20s both; pointer-events:none;" viewBox="0 0 390 844" fill="none" preserveAspectRatio="none">
        <defs>
          <filter id="tGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
          </filter>
          <filter id="sGlow" x="-200%" y="-200%" width="600%" height="600%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="2.5"/>
          </filter>
        </defs>
        <!-- Glow layer -->
        <path d="M 195 422 C 168 318 88 186 24 24" stroke="rgba(168,151,255,0.55)" stroke-width="16" fill="none" filter="url(#tGlow)" stroke-linecap="round"/>
        <!-- Crisp dashed line -->
        <path d="M 195 422 C 168 318 88 186 24 24" stroke="rgba(168,151,255,0.22)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-dasharray="5 7"/>
        <!-- Sparkle particles -->
        <circle cx="158" cy="334" r="3.5" fill="rgba(196,184,255,0.75)" filter="url(#sGlow)"/>
        <circle cx="108" cy="218" r="2.8" fill="rgba(196,184,255,0.58)" filter="url(#sGlow)"/>
        <circle cx="64"  cy="124" r="2.2" fill="rgba(196,184,255,0.45)" filter="url(#sGlow)"/>
        <circle cx="38"  cy="66"  r="1.8" fill="rgba(196,184,255,0.35)" filter="url(#sGlow)"/>
      </svg>

      <!-- ── PHASE 7+: NAV BAR ── -->
      <div style="position:absolute; top:0; left:0; right:0; height:48px; background:rgba(12,9,26,0.97); border-bottom:1px solid rgba(107,95,232,0.10); animation:navAppear 0.30s ease-out 2.50s both; z-index:20;">
        <div style="position:absolute; inset:0; background:linear-gradient(to right,rgba(107,95,232,0.13),transparent 45%);"></div>
        <!-- Right nav items -->
        <div style="position:absolute; top:50%; right:16px; transform:translateY(-50%); display:flex; gap:10px; align-items:center; animation:contentAppear 0.3s ease-out 3.05s both; opacity:0;">
          <div style="width:5px; height:5px; border-radius:50%; background:rgba(107,95,232,0.28);"></div>
          <div style="width:5px; height:5px; border-radius:50%; background:rgba(107,95,232,0.28);"></div>
          <div style="width:22px; height:22px; border-radius:50%; background:rgba(44,36,80,0.75); border:1px solid rgba(107,95,232,0.22);"></div>
        </div>
      </div>

      <!-- ── PHASE 7+: NAV GLOW (ambient from Orb) ── -->
      <div style="position:absolute; top:0; left:0; width:96px; height:68px; background:radial-gradient(ellipse at 16% 28%,rgba(107,95,232,0.22) 0%,transparent 70%); animation:navAppear 0.3s ease-out 2.7s both, navGlowBreathe 2.4s ease-in-out 2.9s infinite; opacity:0; z-index:19;"></div>

      <!-- ── PHASE 7+: NAV ORB (permanent, breathing) ── -->
      <div style="position:absolute; top:24px; left:24px; width:24px; height:24px; border-radius:50%; background:radial-gradient(circle at 36% 30%,#EDE8FF 0%,#B4A8FF 18%,#7B6FE8 46%,#3D2FBE 72%,#1A0F6B 92%); transform:translate(-50%,-50%); animation:navOrbArrive 0.22s cubic-bezier(0.34,1.56,0.64,1) 2.60s both, orbBreatheNav 2.4s ease-in-out 2.82s infinite; z-index:22;">
        <div style="position:absolute; top:18%; left:18%; width:28%; height:22%; border-radius:50%; background:rgba(255,252,255,0.22); filter:blur(1px);"></div>
      </div>

      <!-- ══════════════════════════════════════════ -->
      <!-- WORKSPACE CARDS — crystallize from trail  -->
      <!-- ══════════════════════════════════════════ -->

      <!-- CARD 1: Primary greeting surface (first to crystallize) -->
      <div style="position:absolute; top:62px; left:14px; width:216px; height:134px; background:rgba(20,14,50,0.88); border-radius:10px; border:1px solid rgba(107,95,232,0.18); animation:cardBirth 0.42s cubic-bezier(0.34,1.56,0.64,1) 2.72s both, cardBorderGlow 3.6s ease-in-out 3.3s infinite; overflow:hidden; z-index:10;">
        <div style="position:absolute; top:0; left:0; right:0; height:1.5px; background:linear-gradient(to right,transparent,rgba(168,151,255,0.80),transparent);"></div>
        <div style="position:absolute; top:0; bottom:0; width:64px; background:linear-gradient(to right,transparent,rgba(168,151,255,0.11),transparent); animation:shimmerOnce 0.75s ease-out 3.02s both;"></div>
        <!-- Content -->
        <div style="padding:14px 14px 0;">
          <div style="font-family:'DM Mono',monospace; font-size:7.5px; color:rgba(107,95,232,0.52); letter-spacing:0.26em; text-transform:uppercase; margin-bottom:9px; animation:contentAppear 0.3s ease-out 3.10s both; opacity:0;">Flow AI · Today</div>
          <div style="font-family:'DM Sans',sans-serif; font-size:17px; font-weight:300; font-style:italic; color:rgba(224,220,255,0.86); line-height:1.2; margin-bottom:10px; animation:contentAppear 0.35s ease-out 3.20s both; opacity:0;">Good morning, Aryan.</div>
          <div style="height:1px; background:linear-gradient(to right,rgba(107,95,232,0.28),transparent); margin-bottom:9px; animation:contentAppear 0.3s ease-out 3.30s both; opacity:0;"></div>
          <div style="font-size:10.5px; color:rgba(168,151,255,0.60); font-weight:300; margin-bottom:9px; animation:contentAppear 0.3s ease-out 3.35s both; opacity:0;">3 priorities · 1 meeting</div>
          <div style="animation:contentAppear 0.3s ease-out 3.45s both; opacity:0; display:inline-block;">
            <div style="padding:5px 10px; background:rgba(107,95,232,0.16); border:1px solid rgba(107,95,232,0.28); border-radius:5px; font-size:10px; color:rgba(196,184,255,0.82); white-space:nowrap;">Deep Work · 2h block</div>
          </div>
        </div>
      </div>

      <!-- CARD 2: Habits (right column top) -->
      <div style="position:absolute; top:62px; left:244px; right:14px; height:62px; background:rgba(16,11,38,0.82); border-radius:9px; border:1px solid rgba(107,95,232,0.14); animation:cardBirth 0.42s cubic-bezier(0.34,1.56,0.64,1) 2.86s both, cardBorderGlow 3.6s ease-in-out 3.5s infinite; overflow:hidden; z-index:10;">
        <div style="position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(to right,transparent,rgba(168,151,255,0.58),transparent);"></div>
        <div style="position:absolute; top:0; bottom:0; width:50px; background:linear-gradient(to right,transparent,rgba(168,151,255,0.08),transparent); animation:shimmerOnce 0.75s ease-out 3.14s both;"></div>
        <div style="padding:10px 12px; animation:contentAppear 0.3s ease-out 3.26s both; opacity:0;">
          <div style="font-family:'DM Mono',monospace; font-size:7px; color:rgba(107,95,232,0.38); letter-spacing:0.2em; text-transform:uppercase; margin-bottom:7px;">Habits</div>
          <div style="display:flex; gap:7px; align-items:center;">
            <div style="width:18px; height:18px; border-radius:50%; background:rgba(107,95,232,0.55); border:1.5px solid rgba(107,95,232,0.75);"></div>
            <div style="width:18px; height:18px; border-radius:50%; background:rgba(107,95,232,0.50); border:1.5px solid rgba(107,95,232,0.68);"></div>
            <div style="width:18px; height:18px; border-radius:50%; border:1.5px dashed rgba(107,95,232,0.28);"></div>
            <div style="font-size:9px; color:rgba(168,151,255,0.48); font-weight:300; margin-left:2px;">2 of 3</div>
          </div>
        </div>
      </div>

      <!-- CARD 3: Schedule (right column bottom) -->
      <div style="position:absolute; top:132px; left:244px; right:14px; height:64px; background:rgba(16,11,36,0.78); border-radius:9px; border:1px solid rgba(107,95,232,0.12); animation:cardBirth 0.42s cubic-bezier(0.34,1.56,0.64,1) 2.98s both, cardBorderGlow 3.6s ease-in-out 3.7s infinite; overflow:hidden; z-index:10;">
        <div style="position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(to right,transparent,rgba(168,151,255,0.45),transparent);"></div>
        <div style="position:absolute; top:0; bottom:0; width:50px; background:linear-gradient(to right,transparent,rgba(168,151,255,0.07),transparent); animation:shimmerOnce 0.75s ease-out 3.24s both;"></div>
        <div style="padding:10px 12px; animation:contentAppear 0.3s ease-out 3.36s both; opacity:0;">
          <div style="font-family:'DM Mono',monospace; font-size:7px; color:rgba(107,95,232,0.33); letter-spacing:0.2em; text-transform:uppercase; margin-bottom:7px;">Today</div>
          <div style="display:flex; gap:6px; align-items:center; margin-bottom:3px;">
            <div style="width:3px; height:3px; border-radius:50%; background:rgba(107,95,232,0.55); flex:0 0 auto;"></div>
            <div style="font-size:10px; color:rgba(168,151,255,0.62); font-weight:300;">10:00 · Design review</div>
          </div>
          <div style="font-size:10px; color:rgba(107,95,232,0.33); font-weight:300; padding-left:9px;">Free after 6pm</div>
        </div>
      </div>

      <!-- CARD 4: Weekly momentum (full width) -->
      <div style="position:absolute; top:206px; left:14px; right:14px; height:78px; background:rgba(14,10,34,0.78); border-radius:9px; border:1px solid rgba(107,95,232,0.10); animation:cardBirth 0.42s cubic-bezier(0.34,1.56,0.64,1) 3.10s both, cardBorderGlow 3.6s ease-in-out 3.8s infinite; overflow:hidden; z-index:10;">
        <div style="position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(to right,transparent,rgba(168,151,255,0.36),transparent);"></div>
        <div style="position:absolute; top:0; bottom:0; width:80px; background:linear-gradient(to right,transparent,rgba(168,151,255,0.06),transparent); animation:shimmerOnce 0.75s ease-out 3.36s both;"></div>
        <div style="padding:13px 14px; animation:contentAppear 0.3s ease-out 3.46s both; opacity:0;">
          <div style="font-family:'DM Mono',monospace; font-size:7px; color:rgba(107,95,232,0.32); letter-spacing:0.2em; text-transform:uppercase; margin-bottom:8px;">Weekly Momentum</div>
          <div style="height:3px; background:rgba(107,95,232,0.14); border-radius:2px; margin-bottom:8px; overflow:hidden;">
            <div style="height:100%; width:0%; background:linear-gradient(to right,#6858C0,#9B8FFF); border-radius:2px; animation:progressFill 0.6s ease-out 3.7s both;"></div>
          </div>
          <div style="display:flex; justify-content:space-between;">
            <div style="font-size:10px; color:rgba(168,151,255,0.50); font-weight:300;">68% · on track</div>
            <div style="font-size:10px; color:rgba(107,95,232,0.38); font-weight:300;">5 days left</div>
          </div>
        </div>
      </div>

      <!-- CARD 5: Partial peek card at bottom -->
      <div style="position:absolute; top:294px; left:14px; right:14px; height:56px; background:rgba(12,8,28,0.62); border-radius:9px; border:1px solid rgba(107,95,232,0.08); animation:cardBirth 0.42s cubic-bezier(0.34,1.56,0.64,1) 3.22s both; overflow:hidden; z-index:10;">
        <div style="position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(to right,transparent,rgba(168,151,255,0.22),transparent);"></div>
        <div style="padding:12px 14px; animation:contentAppear 0.3s ease-out 3.55s both; opacity:0;">
          <div style="width:55%; height:3px; border-radius:2px; background:rgba(168,151,255,0.16);"></div>
          <div style="width:35%; height:3px; border-radius:2px; background:rgba(168,151,255,0.09); margin-top:6px;"></div>
        </div>
      </div>

      <!-- Bottom vignette -->
      <div style="position:absolute; bottom:0; left:0; right:0; height:90px; background:linear-gradient(to bottom,transparent,#07060E); pointer-events:none; z-index:30;"></div>

    </div><!-- /key wrapper -->

    <!-- ─────────────────────────────────────────── -->
    <!-- REPLAY BUTTON (outside key wrapper)         -->
    <!-- ─────────────────────────────────────────── -->
    <sc-if value="{{ showReplay }}">
      <div style="position:absolute; bottom:36px; left:50%; animation:replayIn 0.5s ease-out both; z-index:50; cursor:pointer;" onClick="{{ replay }}">
        <div style="padding:11px 26px; background:rgba(18,12,44,0.92); border:1px solid rgba(107,95,232,0.38); border-radius:28px; display:flex; align-items:center; gap:9px; backdrop-filter:blur(8px);">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
            <path d="M 11 6.5 A 4.5 4.5 0 1 1 6.5 2 M 6.5 2 L 9 4.2 M 6.5 2 L 4 4.2" stroke="rgba(168,151,255,0.78)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span style="font-family:'DM Mono',monospace; font-size:10px; color:rgba(168,151,255,0.72); letter-spacing:0.26em; text-transform:uppercase;">Replay</span>
        </div>
      </div>
    </sc-if>

    <!-- Prototype label (bottom-right, always visible) -->
    <div style="position:absolute; bottom:12px; right:16px; font-family:'DM Mono',monospace; font-size:8px; color:rgba(58,52,88,0.55); letter-spacing:0.2em; text-transform:uppercase; pointer-events:none; z-index:40;">PULSE + Continuity · v2</div>

  </div><!-- /phone -->
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { playKey: 0, showReplay: false };

  componentDidMount() {
    this._scheduleReplay();
  }

  componentDidUpdate(prev) {
    if (prev.state.playKey !== this.state.playKey) {
      this._scheduleReplay();
    }
  }

  _scheduleReplay() {
    this.setState({ showReplay: false });
    clearTimeout(this._t);
    this._t = setTimeout(() => this.setState({ showReplay: true }), 5200);
  }

  replay() {
    this.setState(s => ({ playKey: s.playKey + 1, showReplay: false }));
  }

  renderVals() {
    return {
      playKey: this.state.playKey,
      showReplay: this.state.showReplay,
      replay: () => this.replay(),
    };
  }
}

</script>
</body>
</html>
